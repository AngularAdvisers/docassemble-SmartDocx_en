---
include:
  - init-data_en.yml
---
features:
  css: docassemble.SmartDocx_en:data/static/sd_en.css
---
metadata:
  title: |
    Legal Services Agreement Document
  short title: |
    Services Agreement
  description: |
    This the legal services agreement document
  authors:
    - name: William Best
      organization: Andjelkovic Law Firm
    - name: Nemanja Anđelković
      organization: Andjelkovic Law Firm
  revision_date: 2024-04-09
---
sections:
  - Client's Name
  - Client's Address
  - Lawyer's Name
  - Lawyer's Address
  - Fee Amount
  - Signing Date
  - Signature
  - Completed
---
features:
  navigation: True
  progress bar: True
---
objects:
  - lsa_client_individual: Individual
  - lsa_client_address: Address
  - lsa_lawyer_individual: Individual
  - lsa_lawyer_address: Address
---
initial: True
code: |
  set_language('en')
---
mandatory: True
progress: 1
section: Client's Name
question: |
  What is the client's name?
fields:
  - First Name: lsa_client_individual.name.first
    default: |
      ${ sd_client_first_name }  
  - Middle Name: lsa_client_individual.name.middle
    required: False
  - Last Name: lsa_client_individual.name.last
    default: |
      ${ sd_client_last_name }  
  - Suffix: lsa_client_individual.name.suffix
    required: False
    code: name_suffix()
---
mandatory: True
progress: 15
section: Client's Address
question: |
  What is the Client's address?
fields:
  - Address: lsa_client_address.address
    default: |
      ${ sd_client_street }  
  - Unit: lsa_client_address.unit
    required: False
  - City: lsa_client_address.city
    default: |
      ${ sd_client_city }  
  - State: lsa_client_address.state
    required: False
  - Postal Code: lsa_client_address.postal_code
    default: |
      ${ sd_client_zip }  
    required: False
  - Country: lsa_client_address.country
    code: |
      countries_list()
    required: False
---
mandatory: True
progress: 30
section: Lawyer's Name
question: |
  What is the lawyer's name?
fields:
  - First Name: lsa_lawyer_individual.name.first
    default: |
      ${ sd_lawyer_first_name }  
  - Middle Name: lsa_lawyer_individual.name.middle
    required: False
  - Last Name: lsa_lawyer_individual.name.last
    default: |
      ${ sd_lawyer_last_name }  
  - Suffix: lsa_lawyer_individual.name.suffix
    required: False
    code: name_suffix()
---
mandatory: True
progress: 45
section: Lawyer's Address
question: |
  What is the Lawyer's address?
fields:
  - Address: lsa_lawyer_address.address
    default: |
      ${ sd_lawyer_street }  
  - Unit: lsa_lawyer_address.unit
    required: False
  - City: lsa_lawyer_address.city
    default: |
      ${ sd_lawyer_city }  
  - State: lsa_lawyer_address.state
    required: False
  - Postal Code: lsa_lawyer_address.postal_code
    default: |
      ${ sd_lawyer_zip }  
    required: False
  - Country: lsa_lawyer_address.country
    code: |
      countries_list()
    required: False
---
mandatory: True
progress: 60
section: Fee Amount
question: |
  What is the legal service agreement fee amount?
fields:
  - Value: lsa_fee
    datatype: currency
under: |
  Client: ${lsa_client_individual}<br>
  Client Address: ${lsa_client_address}<br>
  Lawyer: ${lsa_lawyer_individual}<br>
  Lawyer Address: ${lsa_lawyer_address}
---
code: |
  lsa_fee_amount = "{:.2f}".format(lsa_fee)
---
mandatory: True
progress: 75
section: Signing Date
question: |
  What date did the client sign the agreement?
fields:
  - Date: lsa_date_signed
    datatype: date
---
mandatory: True
question: Please sign below
progress: 90
section: Signature
subquestion: |
  By signing below, you acknowledge that your answers to the questions
  in this interview were truthful, to the best of your knowledge and you
  agree to the terms of the agreement.
signature: lsa_client_signature
under: |
  Client: ${lsa_client_address}<br>
  Client Address: ${lsa_client_address}<br>
  Lawyer: ${lsa_lawyer_individual}<br>
  Lawyer Address: ${lsa_lawyer_address}<br>
  Fee Amount: ${lsa_fee_amount} <br>
  Date Signed: ${lsa_date_signed}
---
mandatory: True
progress: 100
section: Completed
question: |
  The following document has been created.
subquestion: |
  <div style="margin: 1rem 0;">
    <button type="button" class="btn btn-primary"
            style="border-radius: 20px; padding: 0.5rem 1.5rem;
                   color: #fff;"
            onclick="smartDocxSaveAndExit(this)">
      Save and Exit
    </button>
  </div>

  <h2 style="margin-top: 1.5rem;">${ doc_title }</h2>

  <!--
    Iframe instead of `${ doc_file.pdf.show(...) }` — DA's `.show` renders
    only the PDF's first page as a thumbnail image, which is useless for
    multi-page documents (Legal Services Agreement, Lifetime Support
    Agreement, etc.). Loading the PDF in an iframe lets the browser's
    native viewer handle pagination, zoom, and search.
    URL hash params: keep the toolbar (page nav + zoom), hide the side
    panel for a cleaner embed, fit width by default.
  -->
  <div style="border: 1px solid rgba(0,0,0,0.1); border-radius: 6px;
              overflow: hidden; margin: 1rem 0; height: 70vh;
              background: #fafafa;">
    <iframe
      src="${ doc_file.pdf.url_for() }#toolbar=1&navpanes=0&view=FitH"
      width="100%"
      height="100%"
      style="border: 0;"
      title="Document preview">
    </iframe>
  </div>

  <p style="margin-top: 1rem;">
    <a href="${ doc_file.docx.url_for(attachment=True) }">
      <i class="fas fa-file-word"></i> DOCX
    </a>
    (for editing; requires Microsoft Word or compatible application)
  </p>
  <p>
    <a href="${ doc_file.pdf.url_for(attachment=True) }">
      <i class="fas fa-file-pdf"></i> PDF
    </a>
    (for viewing; requires Adobe PDF viewer or compatible application)
  </p>
# `smartDocxSaveAndExit` is defined globally in init-data_en.yml so every
# interview can reuse the same Save-and-Exit handler. postMessage used to
# fire automatically when this screen rendered, but that (a) skipped past
# the download/email buttons the user expects on a docassemble completion
# page and (b) raced docassemble's own attachment generation, which caused
# the Smart-Docx preview dialog to open before the assembled DOCX was
# readable via /api/file — the root cause of the "no preview" bug.
---
# The attachment MUST be in its own top-level block (separated by ---)
# rather than folded into the mandatory:True completion question above.
#
# If it lives on the completion question, the YAML parses into one mapping
# where `subquestion:` references `${ doc_file.pdf.show(...) }` and
# `attachment: ... variable name: doc_file` tries to assemble that same
# variable. Docassemble marks the question "in progress" while rendering
# its subquestion, so when the resolver follows the doc_file reference
# back to the same block, it sees the block is already on the stack and
# aborts with:
#
#    Infinite loop: doc_file already looked for, where stack is set()
#
# (Empty stack because the cycle closes at the outermost resolution.)
#
# As a standalone block, the attachment becomes an on-demand assembler:
# DA generates doc_file the first time anything references it, caches the
# DAFileList, and the completion question just consumes the already-built
# variable. No cycle, preview renders, Save and Exit works.
attachment:
  - name: Legal Services Agreement
    filename: legal_services_agreement_document
    docx template file: legal-services-agreement_en.docx
    variable name: doc_file
    valid formats:
      - docx
      - pdf
