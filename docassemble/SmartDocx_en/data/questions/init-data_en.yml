---
code: |
  def upload_to_volume(doc_path, bucket_name, file_name):
    """
    Copy an assembled document to the shared Docassemble files volume.

    Smart-Docx no longer uses S3 — storage is handled by the Nest
    backend's StorageService, which persists to the `smart-docx_storage`
    Docker volume. Interviews that reach their `attachment:` block and
    then post `docassemble:complete` to the parent frame are picked up
    automatically by DocassembleService.fetchGeneratedFile() in the
    backend (via /api/file/<number>) and attached to the matter.

    This helper is kept for backward compatibility with legacy interviews
    that still call the old S3 uploader by name; it copies the document
    into `generated/<bucket_name>/<file_name>` under the container's
    `/usr/share/docassemble/files` volume so nothing blows up if a call
    site hasn't been migrated yet.
    """
    import os, shutil
    target_dir = os.path.join('/usr/share/docassemble/files', 'generated', bucket_name)
    try:
      os.makedirs(target_dir, exist_ok=True)
      shutil.copyfile(doc_path, os.path.join(target_dir, file_name))
    except Exception as e:
      return f"An error occurred copying to the shared volume. Detailed Message:{str(e)}"
