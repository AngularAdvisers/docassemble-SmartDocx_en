mandatory: True
code: |
  multi_user = True
---
# Inject a tiny JS helper on every screen so the per-interview final
# question just needs a <button onclick="smartDocxSaveAndExit(this)">.
# Using `default screen parts` with `post` puts the <script> below the
# question body so the function is defined before any button calls it.
default screen parts:
  post: |
    <style>
      /* HotDocs theme — inlined in every interview response so it
         can never be cached stale. (DA serves /packagestatic/* with
         Cache-Control: public, max-age=31536000, which kept every
         browser locked to the version of sd_en.css that landed on
         their first visit, regardless of package upgrades.) */
      :root {
        --sd-primary: #00578B;
        --sd-primary-hover: #03446e;
        --sd-accent: #4F92C8;
        --sd-active-bg: #E5EFF7;
        --sd-rail-bg: #F4F6F8;
        --sd-pane-bg: #FFFFFF;
        --sd-page-bg: #FAFBFC;
        --sd-border: #C4CDD8;
        --sd-text: #1F2937;
        --sd-muted: #64748B;
        --sd-tick: #2A9D3D;
        --sd-progress: #76D156;
        --sd-input-bg: #FFFFFF;
        --sd-input-text: #1F2937;
        --sd-button-secondary-bg: #FFFFFF;
      }
      [data-bs-theme="dark"] {
        --sd-primary: #6BA8DD;
        --sd-primary-hover: #8FBCE5;
        --sd-accent: #4F92C8;
        --sd-active-bg: rgba(79, 146, 200, 0.22);
        --sd-rail-bg: #1E293B;
        --sd-pane-bg: #0F172A;
        --sd-page-bg: #0B1220;
        --sd-border: #475569;
        --sd-text: #F1F5F9;
        --sd-muted: #94A3B8;
        --sd-tick: #4ADE80;
        --sd-progress: #4ADE80;
        --sd-input-bg: #1E293B;
        --sd-input-text: #F1F5F9;
        --sd-button-secondary-bg: #1E293B;
      }
      .navbar { display: none; }
      body {
        background: var(--sd-page-bg);
        color: var(--sd-text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        padding-bottom: 72px !important;
      }
      .sd-outline-header {
        display: flex; align-items: center; gap: 8px;
        padding: 12px 16px;
        background: var(--sd-rail-bg); color: var(--sd-text);
        font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
        text-transform: uppercase; cursor: pointer; user-select: none;
        border-bottom: 1px solid var(--sd-border);
      }
      .sd-outline-header:hover { color: var(--sd-primary); }
      .sd-outline-chev {
        font-size: 12px; color: var(--sd-muted);
        width: 14px; display: inline-block;
      }
      .sd-outline-title { flex: 1; }
      div.danavdiv {
        margin-top: 0; padding: 0 0 12px 0;
        background: var(--sd-rail-bg);
        border-right: 2px solid var(--sd-border);
        min-height: 100vh;
      }
      div.danavdiv.sd-rail-collapsed div.dasections,
      div.danavdiv.sd-rail-collapsed > *:not(.sd-outline-header) {
        display: none;
      }
      div.dasections { line-height: 1.4; padding-top: 8px; }
      div.dasections .btn {
        display: flex; align-items: center; gap: 10px;
        width: 100%; text-align: left;
        font-size: 14px; font-weight: 500; color: var(--sd-text);
        padding: 9px 16px 9px 36px;
        border-radius: 0; background: transparent;
        border: none; border-left: 3px solid transparent;
        position: relative; white-space: normal;
      }
      div.dasections .btn:hover {
        text-decoration: none;
        background: rgba(0, 87, 139, 0.06); color: var(--sd-primary);
      }
      [data-bs-theme="dark"] div.dasections .btn:hover {
        background: rgba(107, 168, 221, 0.08);
      }
      div.dasections .btn[data-sd-group] {
        font-weight: 600; cursor: pointer; padding-left: 30px;
      }
      div.dasections .btn[data-sd-group]::before {
        content: ""; position: absolute; left: 12px; top: 50%;
        width: 0; height: 0; margin-top: -4px;
        border-style: solid; border-width: 4px 0 4px 6px;
        border-color: transparent transparent transparent var(--sd-muted);
        transition: transform 0.15s ease; transform-origin: 2px 50%;
      }
      div.dasections .btn[data-sd-group][data-sd-collapsed="0"]::before {
        transform: rotate(90deg);
      }
      div.dasections .dainlineinside[data-sd-collapsed="1"] { display: none; }
      div.dasections .btn[data-sd-status="complete"]::after,
      div.dasections .btn[data-sd-status="active"]::after {
        content: ""; position: absolute; left: 12px; top: 50%;
        transform: translateY(-50%);
        width: 16px; height: 16px; border-radius: 50%;
        font-size: 11px; font-weight: 700;
        display: inline-flex; align-items: center; justify-content: center;
        line-height: 1;
      }
      div.dasections .btn[data-sd-status="complete"]::after {
        content: "✓"; background: var(--sd-tick); color: #ffffff;
      }
      div.dasections .btn[data-sd-status="active"]::after {
        content: ""; background: var(--sd-pane-bg);
        border: 2px solid var(--sd-primary);
        width: 14px; height: 14px;
      }
      div.dasections .btn.daactive,
      div.dasections .daactive,
      div.dasections .btn.btn-primary.daactive {
        background: var(--sd-active-bg) !important;
        color: var(--sd-primary) !important;
        font-weight: 600;
        border-left: 3px solid var(--sd-primary);
      }
      div.dasections div.dainlineinside .btn {
        padding-left: 48px; font-size: 13px;
        font-weight: 400; color: var(--sd-muted);
      }
      div.dasections div.dainlineinside .btn[data-sd-status="complete"]::after,
      div.dasections div.dainlineinside .btn[data-sd-status="active"]::after {
        left: 24px; width: 14px; height: 14px; font-size: 10px;
      }
      div.dasections div.dainlineinside .btn[data-sd-status="active"]::after {
        width: 12px; height: 12px;
      }
      .sd-section-title-bar {
        background: var(--sd-active-bg); color: var(--sd-primary);
        padding: 14px 24px; margin: 0 0 16px 0;
        font-size: 16px; font-weight: 600;
        border-bottom: 1px solid var(--sd-border);
      }
      #dadiv, .daquestion {
        background: var(--sd-pane-bg); color: var(--sd-text); padding: 0;
      }
      .daquestion .form-control,
      .daquestion input[type="text"],
      .daquestion input[type="email"],
      .daquestion input[type="number"],
      .daquestion input[type="date"],
      .daquestion select,
      .daquestion textarea {
        background: var(--sd-input-bg); color: var(--sd-input-text);
        border: 1px solid var(--sd-border); border-radius: 4px;
        padding: 8px 12px; font-size: 14px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .daquestion .form-control:focus,
      .daquestion input:focus,
      .daquestion select:focus,
      .daquestion textarea:focus {
        border-color: var(--sd-primary);
        box-shadow: 0 0 0 3px rgba(0, 87, 139, 0.18);
        outline: none;
      }
      .daquestion label {
        font-weight: 500; color: var(--sd-text);
        margin-bottom: 6px; font-size: 13px;
      }
      .danavlinkbuttons,
      button[name="_continue"],
      button[name="_back_button"],
      #daQuestionSubmit,
      #daPageBack {
        position: absolute !important;
        width: 1px !important; height: 1px !important;
        padding: 0 !important; margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        border: 0 !important; white-space: nowrap !important;
      }
      .sd-bottom-bar {
        position: fixed; bottom: 0; left: 0; right: 0;
        display: flex; align-items: center; gap: 8px;
        padding: 10px 24px;
        background: var(--sd-pane-bg);
        border-top: 1px solid var(--sd-border);
        z-index: 1000;
        box-shadow: 0 -2px 8px rgba(15, 23, 42, 0.06);
      }
      .sd-bottom-bar .sd-btn--prev { margin-right: auto; }
      [data-bs-theme="dark"] .sd-bottom-bar {
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.4);
      }
      .sd-btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 7px 18px; font-size: 13px; font-weight: 500;
        border-radius: 4px; border: 1px solid var(--sd-border);
        background: var(--sd-button-secondary-bg);
        color: var(--sd-text); cursor: pointer;
        transition: background 0.12s, border-color 0.12s;
      }
      .sd-btn:hover {
        background: var(--sd-active-bg);
        border-color: var(--sd-primary); color: var(--sd-primary);
      }
      .sd-btn--next, .sd-btn--finish {
        background: var(--sd-primary); border-color: var(--sd-primary);
        color: #ffffff;
      }
      .sd-btn--next:hover, .sd-btn--finish:hover {
        background: var(--sd-primary-hover);
        border-color: var(--sd-primary-hover); color: #ffffff;
      }
      .sd-btn-glyph { font-size: 11px; }
      .sd-bottom-bar.sd-bottom-bar--final .sd-btn--next { display: none; }
      div.daprogress .progress {
        height: 4px; background: transparent; border-radius: 0;
      }
      div.daprogress .progress-bar { background: var(--sd-progress); }
      @media (max-width: 991.98px) {
        div.danavdiv {
          min-height: auto; border-right: 0;
          border-bottom: 2px solid var(--sd-border);
          padding: 0 0 8px 0;
        }
        div.dasections .btn { padding: 8px 12px 8px 36px; font-size: 13px; }
        .sd-section-title-bar { padding: 12px 16px; font-size: 15px; }
        .sd-bottom-bar { padding: 8px 16px; }
        .sd-btn { padding: 6px 14px; font-size: 12px; }
        body { padding-bottom: 64px !important; }
      }
      @media (min-width: 992px) {
        .sd-outline-header { padding: 10px 14px; font-size: 12px; }
        div.danavdiv { padding-bottom: 10px; }
        div.dasections .btn { padding: 7px 14px 7px 34px; font-size: 13px; }
        div.dasections .btn[data-sd-group] { padding-left: 28px; }
        div.dasections .btn[data-sd-status="complete"]::after,
        div.dasections .btn[data-sd-status="active"]::after {
          left: 11px; width: 14px; height: 14px; font-size: 10px;
        }
        div.dasections div.dainlineinside .btn {
          padding-left: 42px; font-size: 12px;
        }
        div.dasections div.dainlineinside .btn[data-sd-status="complete"]::after,
        div.dasections div.dainlineinside .btn[data-sd-status="active"]::after {
          left: 22px; width: 12px; height: 12px; font-size: 9px;
        }
        .sd-section-title-bar { padding: 10px 20px; margin: 0 0 12px 0; font-size: 14px; }
        .daquestion .form-control,
        .daquestion input[type="text"],
        .daquestion input[type="email"],
        .daquestion input[type="number"],
        .daquestion input[type="date"],
        .daquestion select,
        .daquestion textarea {
          padding: 4px 8px; font-size: 13px;
          height: calc(1.5em + 0.5rem + 2px);
        }
        .daquestion textarea { height: auto; }
        .daquestion label { margin-bottom: 4px; font-size: 12px; }
        .sd-bottom-bar { padding: 8px 24px; }
        .sd-btn { padding: 5px 14px; font-size: 12px; }
        div.daprogress .progress { height: 3px; }
      }
    </style>
    <script>
      function smartDocxSaveAndExit(btn) {
        if (btn) {
          btn.disabled = true;
          btn.innerText = 'Saving...';
        }
        if (window.parent && window.parent !== window) {
          // Read the current session id from the iframe's URL, not from
          // whatever Smart-Docx remembered when it opened us. DA can mint
          // a fresh session mid-flight (e.g. when the original is GC'd or
          // its YAML changed), and the parent must use *that* id for the
          // attach-to-matter mutation — otherwise the backend hits 400 on
          // GET /api/session?session=<dead id>.
          var sessionId = new URLSearchParams(window.location.search).get('session') || '';
          window.parent.postMessage(
            { type: 'docassemble:complete', sessionId: sessionId },
            '*'
          );
        }
      }

      // Theme bridge — listen for the parent's color-scheme directive and
      // mirror it onto <html data-bs-theme="…">. Smart-Docx posts a
      // `smartdocx:theme` message on iframe load and again whenever its
      // dark/light toggle flips, so the interview always matches the
      // parent app's mode. Falls back to whatever DA's server-side render
      // chose when no message is received (e.g. running outside Smart-Docx).
      (function () {
        function applyTheme(mode) {
          var t = (mode === 'dark') ? 'dark' : 'light';
          document.documentElement.setAttribute('data-bs-theme', t);
        }
        window.addEventListener('message', function (ev) {
          var d = ev && ev.data;
          if (!d || typeof d !== 'object') return;
          if (d.type === 'smartdocx:theme') applyTheme(d.mode);
        });
        // Tell the parent we're ready to receive a theme — covers the
        // edge case where the parent missed the iframe's `load` event
        // (e.g. it loads first and the iframe arrives later) by giving
        // it an explicit re-send trigger.
        if (window.parent && window.parent !== window) {
          try {
            window.parent.postMessage({ type: 'smartdocx:theme-request' }, '*');
          } catch (e) { /* parent in different origin pre-handshake — ignore */ }
        }
      })();

      // ─── HotDocs-style chrome orchestrator ─────────────────────────
      // Builds five HotDocs UI elements on top of Docassemble's chrome:
      //
      //   1. OUTLINE HEADER — "▾ Outline" title at the top of the rail,
      //      clicking it collapses the whole rail to a thin gutter.
      //   2. COLLAPSIBLE GROUPS — top-level sections that contain
      //      subsections get a chevron + expand/collapse handler.
      //      Collapsed-state persists per-interview via sessionStorage.
      //   3. COMPLETION TRACKING — every section the user has been on
      //      (DA flags it with .daactive) is recorded in sessionStorage.
      //      On every render we walk the rail and tag visited buttons
      //      with [data-sd-status="complete"] so the CSS draws the green
      //      ✓ only on sections the user has actually filled — not on
      //      every clickable item like before.
      //   4. SECTION TITLE BAR — synthesised at the top of the question
      //      pane from the active rail item's text content. Always in
      //      sync with what's on screen because we read it AT render
      //      time (the previous Mako approach was one render behind).
      //   5. PREVIOUS / NEXT / FINISH FOOTER — sticky bar at the bottom
      //      that drives DA's hidden Back/Continue buttons via .click().
      //      Finish replaces Next on the final `done` screen.
      //
      // Section keys are derived from textContent, NOT URL params or
      // dataset, so they're consistent across the button-vs-anchor
      // representations DA uses for current vs clickable sections.
      // ────────────────────────────────────────────────────────────────
      (function () {
        var INTERVIEW_KEY = 'sd-visited-' + (window.location.pathname || 'i');
        function loadVisited() {
          try {
            var raw = sessionStorage.getItem(INTERVIEW_KEY);
            return raw ? JSON.parse(raw) : {};
          } catch (e) { return {}; }
        }
        function saveVisited(map) {
          try { sessionStorage.setItem(INTERVIEW_KEY, JSON.stringify(map)); }
          catch (e) {}
        }

        // Stable key across renders — the button's text is the same
        // whether DA renders it as <button> or <a class="daclickable">.
        function keyOf(btn) {
          return (btn.textContent || '').trim().toLowerCase();
        }

        function decorateRail() {
          var rail = document.querySelector('div.dasections');
          if (!rail) return null;

          // 1. OUTLINE HEADER — inject once.
          if (!rail.parentElement.querySelector('.sd-outline-header')) {
            var hdr = document.createElement('div');
            hdr.className = 'sd-outline-header';
            hdr.innerHTML = '<span class="sd-outline-chev">▾</span><span class="sd-outline-title">Outline</span>';
            hdr.addEventListener('click', function () {
              var collapsed = rail.parentElement.classList.toggle('sd-rail-collapsed');
              hdr.querySelector('.sd-outline-chev').textContent = collapsed ? '▸' : '▾';
            });
            rail.parentElement.insertBefore(hdr, rail);
          }

          var visited = loadVisited();
          var activeBtn = rail.querySelector('.daactive');
          var activeKey = activeBtn ? keyOf(activeBtn) : null;

          if (activeKey) {
            visited[activeKey] = true;
            saveVisited(visited);
          }

          // 2. GROUPS — any .btn that is followed by a .dainlineinside
          //    container is a group header. Tag it, give it a chevron,
          //    bind a toggle.
          rail.querySelectorAll('.dainlineinside').forEach(function (children) {
            // Walk back to find the preceding .btn (DA wraps inconsistently).
            var sib = children.previousElementSibling;
            var groupBtn = null;
            while (sib && !groupBtn) {
              if (sib.matches && sib.matches('.btn')) {
                groupBtn = sib;
              } else if (sib.querySelector) {
                groupBtn = sib.querySelector('.btn');
              }
              if (!groupBtn) sib = sib.previousElementSibling;
            }
            if (!groupBtn) return;

            groupBtn.dataset.sdGroup = '1';
            var groupKey = keyOf(groupBtn);
            var collapseKey = INTERVIEW_KEY + ':collapsed:' + groupKey;
            var collapsed = sessionStorage.getItem(collapseKey) === '1';
            children.dataset.sdCollapsed = collapsed ? '1' : '0';
            groupBtn.dataset.sdCollapsed = collapsed ? '1' : '0';

            if (!groupBtn.dataset.sdGroupBound) {
              groupBtn.dataset.sdGroupBound = '1';
              groupBtn.addEventListener('click', function (ev) {
                ev.preventDefault();
                ev.stopPropagation();
                var nowCollapsed = children.dataset.sdCollapsed !== '1';
                children.dataset.sdCollapsed = nowCollapsed ? '1' : '0';
                groupBtn.dataset.sdCollapsed = nowCollapsed ? '1' : '0';
                try { sessionStorage.setItem(collapseKey, nowCollapsed ? '1' : '0'); }
                catch (e) {}
              }, true);
            }
          });

          // Auto-expand the group containing the active section.
          if (activeBtn) {
            var ancestor = activeBtn.closest('.dainlineinside');
            if (ancestor) {
              ancestor.dataset.sdCollapsed = '0';
              var sib2 = ancestor.previousElementSibling;
              while (sib2) {
                var g = sib2.matches && sib2.matches('.btn') ? sib2
                      : (sib2.querySelector ? sib2.querySelector('.btn') : null);
                if (g) { g.dataset.sdCollapsed = '0'; break; }
                sib2 = sib2.previousElementSibling;
              }
            }
          }

          // 3. COMPLETION STATUS on every leaf button.
          rail.querySelectorAll('.btn').forEach(function (btn) {
            if (btn.dataset.sdGroup) return;  // groups don't get a check
            var key = keyOf(btn);
            if (btn.classList.contains('daactive')) {
              btn.dataset.sdStatus = 'active';
            } else if (visited[key]) {
              btn.dataset.sdStatus = 'complete';
            } else {
              btn.removeAttribute('data-sd-status');
            }
          });

          return { activeBtn: activeBtn, activeKey: activeKey };
        }

        // 4. SECTION TITLE BAR. Synthesised at the top of the question
        //    pane — always reflects the current screen because we read
        //    .daactive AT this render. Selector falls through several
        //    plausible DA containers; if none match, we anchor the bar
        //    at the top of <main> or <body> so it's always visible.
        function injectSectionTitle(activeBtn) {
          // Drop any prior bar — DA does full-page reloads but defensive
          // anyway in case a screen renders twice.
          document.querySelectorAll('.sd-section-title-bar').forEach(function (n) { n.remove(); });
          if (!activeBtn) return;
          var label = (activeBtn.textContent || '').trim();
          if (!label) return;

          var bar = document.createElement('div');
          bar.className = 'sd-section-title-bar';
          bar.textContent = label;

          var pane = document.querySelector(
            '#daMainQuestion, #daquestion, #dadiv, [role="main"], main, .dafullscreen'
          );
          if (pane && pane.parentElement) {
            pane.parentElement.insertBefore(bar, pane);
          } else {
            // Last-resort anchor: the bar at the top of body so it's
            // never silently missing if DA's HTML structure shifts.
            document.body.insertBefore(bar, document.body.firstChild);
          }
        }

        // 5. BOTTOM ACTION BAR — Previous / Next / Finish.
        //    Drives DA's existing buttons (which we hide via CSS) so
        //    form submission and back navigation work exactly as DA
        //    intends; we just give the user a HotDocs-style three-button
        //    surface instead of DA's default Back/Continue pair.
        function injectBottomBar(isFinal) {
          // Re-render every page load — DA does full-page reloads so
          // there's no stale-state risk; we just clean any prior bar.
          var existing = document.querySelector('.sd-bottom-bar');
          if (existing) existing.remove();

          var bar = document.createElement('div');
          bar.className = 'sd-bottom-bar';
          if (isFinal) bar.classList.add('sd-bottom-bar--final');

          var prev = document.createElement('button');
          prev.type = 'button';
          prev.className = 'sd-btn sd-btn--prev';
          prev.innerHTML = '<span class="sd-btn-glyph">◀</span> Previous';
          prev.addEventListener('click', function () {
            var back = document.querySelector(
              'button[name="_back_button"], a.danavlinkprevious, #daPageBack'
            );
            if (back) back.click();
            else if (window.history && window.history.length > 1) window.history.back();
          });

          var next = document.createElement('button');
          next.type = 'button';
          next.className = 'sd-btn sd-btn--next';
          next.innerHTML = 'Next <span class="sd-btn-glyph">▶</span>';
          next.addEventListener('click', function () {
            var cont = document.querySelector(
              'button[name="_continue"], #daQuestionSubmit, button[type="submit"]'
            );
            if (cont) cont.click();
          });

          var finish = document.createElement('button');
          finish.type = 'button';
          finish.className = 'sd-btn sd-btn--finish';
          finish.innerHTML = '<span class="sd-btn-glyph">✓</span> Finish';
          finish.addEventListener('click', function () {
            var cont = document.querySelector(
              'button[name="_continue"], #daQuestionSubmit, button[type="submit"]'
            );
            if (cont) cont.click();
          });

          bar.appendChild(prev);
          bar.appendChild(next);
          bar.appendChild(finish);
          document.body.appendChild(bar);
        }

        function paint() {
          var info = decorateRail() || {};
          injectSectionTitle(info.activeBtn);

          var isFinal = info.activeKey === 'completed' || info.activeKey === 'done';
          if (isFinal) document.body.classList.add('sd-screen-final');
          else document.body.classList.remove('sd-screen-final');

          // Only inject the action bar on screens that have a Continue
          // button — skips DA's standalone signature/playground pages.
          if (document.querySelector('button[name="_continue"], #daQuestionSubmit')) {
            injectBottomBar(isFinal);
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', paint);
        } else {
          paint();
        }
      })();
    </script>
---
# Expose the interview's `metadata: title:` as a plain variable so the
# completion screens can render it with `${ doc_title }` instead of
# hard-coding the document name per-file. Each interview YAML sets its
# own `title:` in its metadata block; this helper reads whichever one
# is active for the current interview.
#
# `all_variables(special='metadata')` is Docassemble's supported way to
# read the aggregated metadata dict at runtime. The title uses a `|`
# block scalar in every SmartDocx interview, so `.strip()` removes the
# trailing newline the YAML parser leaves on literal-style scalars.
# Falls back to empty string if metadata is missing (shouldn't happen,
# but keeps the final screen from crashing if an interview ever omits
# its `title:`).
code: |
  doc_title = all_variables(special='metadata').get('title', '').strip()
---
code: |
  set_language('en')

  sd_client_full_name = ''
  sd_client_first_name = ''
  sd_client_last_name = ''
  
  sd_client_dob = ''
  sd_client_place_birth = ''
  
  sd_client_iban = ''
  
