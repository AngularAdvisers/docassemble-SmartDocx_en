mandatory: True
code: |
  multi_user = True
---
# Inject a tiny JS helper on every screen so the per-interview final
# question just needs a <button onclick="smartDocxSaveAndExit(this)">.
# Using `default screen parts` with `post` puts the <script> below the
# question body so the function is defined before any button calls it.
default screen parts:
  post: |
    <style>
      /* HotDocs theme — inlined in every interview response so it
         can never be cached stale. (DA serves /packagestatic/* with
         Cache-Control: public, max-age=31536000, which kept every
         browser locked to the version of sd_en.css that landed on
         their first visit, regardless of package upgrades.) */
      :root {
        --sd-primary: #00578B;
        --sd-primary-hover: #03446e;
        --sd-accent: #4F92C8;
        --sd-active-bg: #E5EFF7;
        --sd-rail-bg: #F4F6F8;
        --sd-pane-bg: #FFFFFF;
        --sd-page-bg: #FAFBFC;
        --sd-border: #C4CDD8;
        --sd-text: #1F2937;
        --sd-muted: #64748B;
        --sd-tick: #2A9D3D;
        --sd-progress: #76D156;
        --sd-input-bg: #FFFFFF;
        --sd-input-text: #1F2937;
        --sd-button-secondary-bg: #FFFFFF;
      }
      [data-bs-theme="dark"] {
        --sd-primary: #6BA8DD;
        --sd-primary-hover: #8FBCE5;
        --sd-accent: #4F92C8;
        --sd-active-bg: rgba(79, 146, 200, 0.22);
        --sd-rail-bg: #1E293B;
        --sd-pane-bg: #0F172A;
        --sd-page-bg: #0B1220;
        --sd-border: #475569;
        --sd-text: #F1F5F9;
        --sd-muted: #94A3B8;
        --sd-tick: #4ADE80;
        --sd-progress: #4ADE80;
        --sd-input-bg: #1E293B;
        --sd-input-text: #F1F5F9;
        --sd-button-secondary-bg: #1E293B;
      }
      .navbar { display: none; }
      body {
        background: var(--sd-page-bg);
        color: var(--sd-text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        padding: 0 !important;
        padding-bottom: 72px !important;
        margin: 0 !important;
      }
      /* Body wrapper + Bootstrap container: zero padding/max-width so
         the rail and question pane sit flush against the iframe's
         left edge, no centred-content gutter. */
      .dabody, .da-pad-for-navbar { padding: 0 !important; margin: 0 !important; }
      .container, .container-fluid, .container-xl, .container-lg,
      .container-md, .container-sm {
        max-width: none !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
      }

      /* HotDocs layout: outline rail (fixed 240px) + question pane
         (fills remainder). Side-by-side at every viewport — DA's
         default Bootstrap row stacks them when col widths don't fit,
         and the user reported the pane being cut off because flex
         items default to `min-width: auto` (refuse to shrink below
         content). Explicit `min-width: 0` on the pane fixes that. */
      .row.tab-content {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: nowrap !important;
        margin: 0 !important;
        width: 100% !important;
      }
      .row.tab-content > [class*="col"] {
        padding-left: 0 !important;
        padding-right: 0 !important;
      }
      /* Hide the horizontal-nav duplicate (DA emits it for narrow
         viewports; we always show the vertical rail instead). */
      .row.tab-content > .col.d-md-none { display: none !important; }
      /* Vertical rail — always visible, fixed width so the pane has
         predictable remaining space. */
      div.danavdiv {
        display: block !important;
        flex: 0 0 240px !important;
        width: 240px !important;
        max-width: 240px !important;
        min-width: 240px !important;
      }
      /* Question pane fills ALL the remaining width and is allowed to
         shrink below its intrinsic content (so long form fields don't
         push the layout off-screen). */
      .row.tab-content > #daquestion {
        flex: 1 1 0 !important;
        width: auto !important;
        max-width: none !important;
        min-width: 0 !important;
        overflow-x: hidden !important;
        padding: 16px 24px !important;
      }
      /* Outline header — matches the section-title-bar's font, size,
         and vertical padding so the two read as a single continuous
         header strip across the top of the iframe (Outline | Section
         Name), divided only by the rail's right border. */
      .sd-outline-header {
        display: flex; align-items: center;
        padding: 12px 16px;
        background: var(--sd-rail-bg); color: var(--sd-text);
        font-size: 16px; font-weight: 600;
        line-height: 1.3;
        cursor: pointer; user-select: none;
        border-bottom: 1px solid var(--sd-border);
      }
      .sd-outline-header:hover { color: var(--sd-primary); }
      .sd-outline-icon {
        display: inline-block !important;
        margin-right: 8px;
        font-size: 14px;
        color: var(--sd-muted);
        width: 16px; text-align: center;
      }
      .sd-outline-title { flex: 1; }
      .sd-outline-chev {
        margin-left: auto;
        font-size: 11px; color: var(--sd-muted);
        display: inline-block;
      }
      /* SIDE RAIL — verified against DA's actual rendered structure:
           <div role="navigation" class="...danavdiv">
             <div class="nav flex-column nav-pills danav danav-vertical danavlinks">
               <a class="nav-link danavlink">[group label]</a>
               <div class="nav flex-column ... danav-vertical danavnested">
                 <a class="daclickable nav-link danavlink active">Client's Name</a>
                 ...
               </div>
               <a class="nav-link danavlink">[next group]</a>
               <div style="display:none" class="danotshowing ...danavnested">
                 ...
               </div>
             </div>
           </div>
         Old selectors (.dasections, .btn, .daactive, .dainlineinside)
         don't match this DA version at all — that's why every prior
         theming pass was a no-op for the actual rail. */
      /* MINIMAL CSS — let DA's default flex layout drive size, position,
         and width. Only override colors / fonts / ::before-::after for
         HotDocs cosmetics. Heavy `!important` on display/border/width
         broke the rail's flex layout in 1.0.42 and hid sections; this
         pass goes back to non-aggressive overrides. */

      /* Pull the rail flush against the left edge and to the top of
         the page — no Bootstrap offset, no top gap. */
      div.danavdiv {
        background: var(--sd-rail-bg);
        border-right: 1px solid var(--sd-border);
        padding: 0 !important;
        margin-left: 0 !important;
        margin-top: 0 !important;
      }
      /* Bootstrap's `.offset-xl-1 .col-xl-2 .col-lg-3 .col-md-3` pushes
         the rail in. Override the column offset — col widths stay so
         the question pane keeps its proportional size. */
      div.danavdiv.offset-xl-1 { margin-left: 0 !important; }

      /* Section row layout: padding-left reserves room for
         [gray twisty 18px @ left:6px] [green check 16px @ left:24px].
         Text starts at 42px. */
      a.danavlink {
        color: var(--sd-text);
        padding-left: 42px !important;
        padding-right: 12px !important;
        position: relative;
      }
      a.danavlink:hover { color: var(--sd-primary); }

      /* AGGRESSIVE: hide every span/i/svg/img inside the rail except
         our own injected elements. DA's bundle.js injects icons /
         toggler arrows after page load and earlier targeted rules
         (`.toggler { display: none }`, `a.danavlink > *`) didn't
         catch every variant. Ours are kept via a class-based
         exception list (.sd-outline-* classes). */
      div.danavdiv span:not(.sd-outline-chev):not(.sd-outline-title):not(.sd-outline-icon),
      div.danavdiv i:not(.sd-outline-icon),
      div.danavdiv svg:not(.sd-outline-icon),
      div.danavdiv img,
      a.danavlink > * {
        display: none !important;
      }

      /* GROUP labels — non-clickable text; collapse handled by our
         injected gray button. */
      a.danavlink:not(.daclickable) {
        font-weight: 700;
        cursor: default;
      }

      /* Group row wrapper — relative-positioned so the gray collapse
         button can absolutely-position next to the link text. */
      .sd-group-row {
        position: relative;
      }
      /* Gray collapse button — sits at the LEFT of the group row,
         left of the check and text. Working click handler in JS. */
      .sd-group-collapse-btn {
        position: absolute;
        left: 6px; top: 50%;
        transform: translateY(-50%);
        width: 18px; height: 18px;
        display: inline-flex;
        align-items: center; justify-content: center;
        background: transparent;
        border: 0;
        color: var(--sd-muted);
        cursor: pointer;
        font-size: 9px;
        line-height: 1;
        border-radius: 3px;
        padding: 0;
        z-index: 2;
      }
      .sd-group-collapse-btn:hover {
        background: rgba(0, 87, 139, 0.10);
        color: var(--sd-primary);
      }

      /* Make every nested group visible by default — override DA's
         auto-collapse. !important wins over DA's inline display:none.
         Our JS toggles a class to override this when the user clicks
         the collapse button. */
      div.danavnested {
        display: block !important;
      }
      div.danavnested.sd-collapsed {
        display: none !important;
      }

      /* SUBSECTION links: smaller font + muted color. Use the SAME
         padding-left as the base rule (42px) so the green ✓ at
         left: 24px doesn't overlap the section text. */
      div.danavnested a.danavlink {
        font-size: 12px;
        font-weight: 400;
        color: var(--sd-muted);
      }
      /* Defensive: kill any ::before pseudo on nav links. Some DA
         rendering paths inject decorative arrows here; combined with
         our injected `.sd-group-collapse-btn` the user was seeing
         two twisties. Keeping ::after free for the status check. */
      a.danavlink::before {
        content: none !important;
        display: none !important;
      }

      /* Active section highlight — pale blue + navy + left bar. */
      a.danavlink.active {
        background: var(--sd-active-bg);
        color: var(--sd-primary);
        font-weight: 600;
        border-left: 3px solid var(--sd-primary);
      }

      /* Status indicator — every section/subsection gets a green
         circle on the left:
           default          → hollow green outline (not yet visited)
           [data-sd-status="complete"]  → filled green with ✓
           [data-sd-status="active"]    → hollow blue (currently here)
         Stays visible even when collapsed so the user can read each
         section's progress at a glance. */
      a.danavlink::after {
        content: "";
        position: absolute; left: 24px; top: 50%;
        transform: translateY(-50%);
        width: 14px; height: 14px; border-radius: 50%;
        background: transparent;
        border: 2px solid var(--sd-tick);
        font-size: 10px; font-weight: 700;
        display: inline-flex; align-items: center; justify-content: center;
        line-height: 1;
        box-sizing: border-box;
      }
      a.danavlink[data-sd-status="complete"]::after {
        content: "✓";
        background: var(--sd-tick);
        color: #ffffff;
        border: none;
        width: 16px; height: 16px;
      }
      a.danavlink[data-sd-status="active"]::after {
        content: "";
        background: var(--sd-pane-bg);
        border: 2px solid var(--sd-primary);
        width: 12px; height: 12px;
      }
      /* Section title bar — first child of #daquestion, extended to
         the pane's full width via negative margins so it bleeds to
         the pane edges. Padding/font match the outline header so
         the two share the same baseline at the top of the iframe. */
      .sd-section-title-bar {
        background: var(--sd-active-bg); color: var(--sd-primary);
        padding: 12px 16px;
        margin: -16px -24px 10px -24px;
        font-size: 16px; font-weight: 600;
        line-height: 1.3;
        border-bottom: 1px solid var(--sd-border);
      }
      #dadiv, #daquestion {
        background: var(--sd-pane-bg); color: var(--sd-text); padding: 0;
      }
      #daquestion .form-control,
      #daquestion input[type="text"],
      #daquestion input[type="email"],
      #daquestion input[type="number"],
      #daquestion input[type="date"],
      #daquestion select,
      #daquestion textarea {
        background: var(--sd-input-bg); color: var(--sd-input-text);
        border: 1px solid var(--sd-border); border-radius: 4px;
        padding: 8px 12px; font-size: 14px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      #daquestion .form-control:focus,
      #daquestion input:focus,
      #daquestion select:focus,
      #daquestion textarea:focus {
        border-color: var(--sd-primary);
        box-shadow: 0 0 0 3px rgba(0, 87, 139, 0.18);
        outline: none;
      }
      #daquestion label {
        font-weight: 500; color: var(--sd-text);
        margin-bottom: 6px; font-size: 13px;
      }

      /* HotDocs-style stacked field layout — label ABOVE the input,
         both full-width, flush left. DA's default emits each field
         as a Bootstrap row with `col-md-4` (label, right-aligned) +
         `col-md-8` (input). With the rail eating 240px the inputs
         end up pushed far to the right inside the pane. Override the
         row to a block layout so each field reads top-down. */
      #daquestion .da-field-container.row,
      #daquestion .da-form-group.row {
        display: block !important;
        margin: 0 0 14px 0 !important;
      }
      #daquestion .da-field-container.row > [class*="col-"],
      #daquestion .da-form-group.row > [class*="col-"] {
        flex: none !important;
        width: 100% !important;
        max-width: 100% !important;
        padding: 0 !important;
      }
      /* Labels: left-aligned (was right-aligned via .datext-right),
         block-level so they sit on their own line above the input. */
      #daquestion .da-field-container label.datext-right,
      #daquestion .da-form-group label.datext-right,
      #daquestion .da-field-container label.col-form-label,
      #daquestion .da-form-group label.col-form-label {
        text-align: left !important;
        display: block;
      }
      /* Pane container — top padding only, no horizontal padding on
         field rows so inputs hug the section title bar's left edge. */
      #daquestion .dafieldpart { padding: 0 !important; }
      /* Hide DA's native Back / Continue button row entirely — the
         HotDocs-style bottom bar (Previous / Next / Finish) is the
         only navigation surface the user should see. Submission still
         works because our bar drives the buttons via
         `jQuery(button).trigger('click')`, which fires DA's bound
         click handlers regardless of visibility. (Earlier attempts
         using `clip-rect` or off-screen positioning + a native
         dispatchEvent broke submission; `display: none` + jQuery
         trigger does not.) */
      #daquestion .da-button-set,
      #da-continue-button,
      #dabackToQuestion {
        display: none !important;
      }
      .sd-bottom-bar {
        position: fixed; bottom: 0; left: 0; right: 0;
        /* Centered grouping: Previous + Next sit together in the
           middle of the bar (Finish replaces Next on the final
           review screen). justify-content: center keeps them
           grouped regardless of viewport width. */
        display: flex; align-items: center; justify-content: center;
        gap: 12px;
        padding: 10px 24px;
        background: var(--sd-pane-bg);
        border-top: 1px solid var(--sd-border);
        z-index: 1000;
        box-shadow: 0 -2px 8px rgba(15, 23, 42, 0.06);
      }
      [data-bs-theme="dark"] .sd-bottom-bar {
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.4);
      }
      .sd-btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 7px 18px; font-size: 13px; font-weight: 500;
        border-radius: 4px; border: 1px solid var(--sd-border);
        background: var(--sd-button-secondary-bg);
        color: var(--sd-text); cursor: pointer;
        transition: background 0.12s, border-color 0.12s;
      }
      .sd-btn:hover {
        background: var(--sd-active-bg);
        border-color: var(--sd-primary); color: var(--sd-primary);
      }
      .sd-btn--next, .sd-btn--finish {
        background: var(--sd-primary); border-color: var(--sd-primary);
        color: #ffffff;
      }
      .sd-btn--next:hover, .sd-btn--finish:hover {
        background: var(--sd-primary-hover);
        border-color: var(--sd-primary-hover); color: #ffffff;
      }
      .sd-btn-glyph { font-size: 11px; }
      .sd-bottom-bar.sd-bottom-bar--final .sd-btn--next { display: none; }
      div.daprogress .progress {
        height: 4px; background: transparent; border-radius: 0;
      }
      div.daprogress .progress-bar { background: var(--sd-progress); }
      @media (max-width: 991.98px) {
        div.danavdiv {
          border-right: 0;
          border-bottom: 1px solid var(--sd-border);
        }
        .sd-section-title-bar { padding: 12px 16px; font-size: 15px; }
        .sd-bottom-bar { padding: 8px 16px; }
        .sd-btn { padding: 6px 14px; font-size: 12px; }
        body { padding-bottom: 64px !important; }
      }
      /* Question text — DA emits `<h1 id="daMainQuestion" class="h3">`.
         Tight spacing so it sits close to the section title bar above
         and the first form field below. */
      #daMainQuestion, #daquestion h1#daMainQuestion {
        font-size: 18px !important;
        font-weight: 600 !important;
        line-height: 1.3 !important;
        margin: 0 0 6px 0 !important;
        padding: 0 !important;
      }

      /* Desktop tweaks — kept minimal so we don't clobber the base
         header rules. (Earlier this @media block reset
         .sd-section-title-bar to 14px and .sd-outline-header to 12px,
         which is why the user kept seeing nothing change despite
         updates to the base size.) */
      @media (min-width: 992px) {
        #daquestion .form-control,
        #daquestion input[type="text"],
        #daquestion input[type="email"],
        #daquestion input[type="number"],
        #daquestion input[type="date"],
        #daquestion select,
        #daquestion textarea {
          padding: 4px 8px; font-size: 13px;
          height: calc(1.5em + 0.5rem + 2px);
        }
        #daquestion textarea { height: auto; }
        #daquestion label { margin-bottom: 4px; font-size: 12px; }
        .sd-bottom-bar { padding: 8px 24px; }
        .sd-btn { padding: 5px 14px; font-size: 12px; }
        div.daprogress .progress { height: 3px; }
      }
    </style>
    <script>
      function smartDocxSaveAndExit(btn) {
        if (btn) {
          btn.disabled = true;
          btn.innerText = 'Saving...';
        }
        if (window.parent && window.parent !== window) {
          // Read the current session id from the iframe's URL, not from
          // whatever Smart-Docx remembered when it opened us. DA can mint
          // a fresh session mid-flight (e.g. when the original is GC'd or
          // its YAML changed), and the parent must use *that* id for the
          // attach-to-matter mutation — otherwise the backend hits 400 on
          // GET /api/session?session=<dead id>.
          var sessionId = new URLSearchParams(window.location.search).get('session') || '';
          window.parent.postMessage(
            { type: 'docassemble:complete', sessionId: sessionId },
            '*'
          );
        }
      }

      // Theme bridge — listen for the parent's color-scheme directive and
      // mirror it onto <html data-bs-theme="…">. Smart-Docx posts a
      // `smartdocx:theme` message on iframe load and again whenever its
      // dark/light toggle flips, so the interview always matches the
      // parent app's mode. Falls back to whatever DA's server-side render
      // chose when no message is received (e.g. running outside Smart-Docx).
      (function () {
        function applyTheme(mode) {
          var t = (mode === 'dark') ? 'dark' : 'light';
          document.documentElement.setAttribute('data-bs-theme', t);
        }
        window.addEventListener('message', function (ev) {
          var d = ev && ev.data;
          if (!d || typeof d !== 'object') return;
          if (d.type === 'smartdocx:theme') applyTheme(d.mode);
        });
        // Tell the parent we're ready to receive a theme — covers the
        // edge case where the parent missed the iframe's `load` event
        // (e.g. it loads first and the iframe arrives later) by giving
        // it an explicit re-send trigger.
        if (window.parent && window.parent !== window) {
          try {
            window.parent.postMessage({ type: 'smartdocx:theme-request' }, '*');
          } catch (e) { /* parent in different origin pre-handshake — ignore */ }
        }
      })();

      // ─── HotDocs-style chrome orchestrator ─────────────────────────
      // Builds five HotDocs UI elements on top of Docassemble's chrome:
      //
      //   1. OUTLINE HEADER — "▾ Outline" title at the top of the rail,
      //      clicking it collapses the whole rail to a thin gutter.
      //   2. COLLAPSIBLE GROUPS — top-level sections that contain
      //      subsections get a chevron + expand/collapse handler.
      //      Collapsed-state persists per-interview via sessionStorage.
      //   3. COMPLETION TRACKING — every section the user has been on
      //      (DA flags it with .daactive) is recorded in sessionStorage.
      //      On every render we walk the rail and tag visited buttons
      //      with [data-sd-status="complete"] so the CSS draws the green
      //      ✓ only on sections the user has actually filled — not on
      //      every clickable item like before.
      //   4. SECTION TITLE BAR — synthesised at the top of the question
      //      pane from the active rail item's text content. Always in
      //      sync with what's on screen because we read it AT render
      //      time (the previous Mako approach was one render behind).
      //   5. PREVIOUS / NEXT / FINISH FOOTER — sticky bar at the bottom
      //      that drives DA's hidden Back/Continue buttons via .click().
      //      Finish replaces Next on the final `done` screen.
      //
      // Section keys are derived from textContent, NOT URL params or
      // dataset, so they're consistent across the button-vs-anchor
      // representations DA uses for current vs clickable sections.
      // ────────────────────────────────────────────────────────────────
      (function () {
        var INTERVIEW_KEY = 'sd-visited-' + (window.location.pathname || 'i');
        function loadVisited() {
          try {
            var raw = sessionStorage.getItem(INTERVIEW_KEY);
            return raw ? JSON.parse(raw) : {};
          } catch (e) { return {}; }
        }
        function saveVisited(map) {
          try { sessionStorage.setItem(INTERVIEW_KEY, JSON.stringify(map)); }
          catch (e) {}
        }

        // Section keyword — DA puts it on `data-key` attribute of every
        // clickable nav link (verified by inspecting rendered HTML).
        // For group labels (no data-key), fall back to text content.
        function keyOf(link) {
          return link.dataset.key || (link.textContent || '').trim().toLowerCase();
        }

        function decorateRail() {
          // The visible side rail. DA wraps it in `.danavdiv` and the
          // inner nav has classes `nav danav danavlinks danav-vertical`.
          // (DA also emits a horizontal copy in the top navbar for
          // narrow viewports — not what we're styling.)
          var rail = document.querySelector('div.danavdiv nav.danavlinks.danav-vertical, div.danavdiv .danav-vertical.danavlinks, div.danavdiv .nav.danav-vertical');
          if (!rail) {
            // Some DA versions wrap differently — second-best: find the
            // first vertical nav inside any .danavdiv.
            var div = document.querySelector('div.danavdiv');
            if (div) rail = div.querySelector('.nav.flex-column, [class*="danav-vertical"]');
          }
          if (!rail) return null;

          // 1. OUTLINE HEADER — inject once.
          //    Layout: [list-ul icon] [Outline title]   [collapse chevron]
          if (!rail.parentElement.querySelector('.sd-outline-header')) {
            var hdr = document.createElement('div');
            hdr.className = 'sd-outline-header';
            hdr.innerHTML =
              '<i class="fa-solid fa-list-ul sd-outline-icon" aria-hidden="true"></i>' +
              '<span class="sd-outline-title">Outline</span>' +
              '<span class="sd-outline-chev">▾</span>';
            hdr.addEventListener('click', function () {
              var collapsed = rail.parentElement.classList.toggle('sd-rail-collapsed');
              hdr.querySelector('.sd-outline-chev').textContent = collapsed ? '▸' : '▾';
            });
            rail.parentElement.insertBefore(hdr, rail);
          }

          var visited = loadVisited();
          var activeLink = rail.querySelector('a.danavlink.active');
          var activeKey = activeLink ? keyOf(activeLink) : null;

          if (activeKey) {
            visited[activeKey] = true;
            saveVisited(visited);
          }

          // 2. FORCE-EXPAND any nested groups DA collapsed via inline
          //    `style="display: none"` (it auto-collapses non-active
          //    groups). Strip the inline style so our CSS wins.
          rail.querySelectorAll('.danavnested').forEach(function (nested) {
            if (nested.style.display === 'none') nested.style.display = '';
          });

          // 2b. GROUP DECORATION — strip DA's injected .toggler arrow
          //     (the BLUE triangle the user wants gone — also hidden
          //     via CSS, this is belt-and-braces), wrap each group
          //     row, inject our own GRAY collapse button on the left,
          //     and compute aggregate status for the group's check.
          rail.querySelectorAll('a.danavlink:not(.daclickable)').forEach(function (groupLink) {
            if (groupLink.parentElement && groupLink.parentElement.classList.contains('sd-group-row')) return;

            // Strip non-text children DA injects (the .toggler span).
            for (var i = groupLink.childNodes.length - 1; i >= 0; i--) {
              var n = groupLink.childNodes[i];
              if (n.nodeType !== 3) groupLink.removeChild(n);
            }
            // Find the matching .danavnested sibling.
            var nested = null;
            var sib = groupLink.nextElementSibling;
            while (sib) {
              if (sib.classList && sib.classList.contains('danavnested')) {
                nested = sib;
                break;
              }
              sib = sib.nextElementSibling;
            }
            if (!nested) return;

            // Wrap the link in a row so the collapse button can sit
            // absolutely positioned next to it.
            var row = document.createElement('div');
            row.className = 'sd-group-row';
            groupLink.parentElement.insertBefore(row, groupLink);
            row.appendChild(groupLink);

            var collapseKey = INTERVIEW_KEY + ':collapsed:' + (groupLink.textContent || '').trim();
            var collapsed = sessionStorage.getItem(collapseKey) === '1';
            if (collapsed) nested.classList.add('sd-collapsed');

            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'sd-group-collapse-btn';
            btn.setAttribute('aria-label', 'Toggle ' + (groupLink.textContent || '').trim());
            btn.textContent = collapsed ? '▶' : '▼';
            btn.addEventListener('click', function (ev) {
              ev.preventDefault();
              ev.stopPropagation();
              var nowCollapsed = !nested.classList.contains('sd-collapsed');
              nested.classList.toggle('sd-collapsed', nowCollapsed);
              btn.textContent = nowCollapsed ? '▶' : '▼';
              try { sessionStorage.setItem(collapseKey, nowCollapsed ? '1' : '0'); } catch (e) {}
            });
            row.appendChild(btn);

            // Aggregate status — green ✓ on the group row when all
            // leaves are visited. Survives collapse so the user can
            // still see overall status when children are hidden.
            var leaves = nested.querySelectorAll('a.danavlink.daclickable');
            var allVisited = leaves.length > 0;
            var anyActive = false;
            leaves.forEach(function (leaf) {
              if (leaf.classList.contains('active')) anyActive = true;
              if (!visited[keyOf(leaf)]) allVisited = false;
            });
            if (anyActive) {
              groupLink.dataset.sdStatus = 'active';
            } else if (allVisited) {
              groupLink.dataset.sdStatus = 'complete';
            } else {
              groupLink.removeAttribute('data-sd-status');
            }
          });

          // 3. COMPLETION STATUS on EVERY nav link (including the
          //    non-clickable "Completed" label and the group rows
          //    that don't have subsections). Groups WITH subsections
          //    get their status overwritten in step 2b below using
          //    aggregate children-visited logic.
          rail.querySelectorAll('a.danavlink').forEach(function (link) {
            var key = keyOf(link);
            if (link.classList.contains('active')) {
              link.dataset.sdStatus = 'active';
            } else if (visited[key]) {
              link.dataset.sdStatus = 'complete';
            } else {
              link.removeAttribute('data-sd-status');
            }
          });

          return { activeBtn: activeLink, activeKey: activeKey };
        }

        // 4. SECTION TITLE BAR. Inserted as the FIRST CHILD of the
        //    question pane so it appears ABOVE the form fields within
        //    the same column. Earlier the bar was inserted as a SIBLING
        //    of #daquestion inside `.row.tab-content`, which (now that
        //    the row is flex-row) made it render as a third column to
        //    the LEFT of the form. The first-child placement keeps it
        //    visually pinned to the top of the form pane.
        function injectSectionTitle(activeBtn) {
          document.querySelectorAll('.sd-section-title-bar').forEach(function (n) { n.remove(); });
          if (!activeBtn) return;
          var label = (activeBtn.textContent || '').trim();
          if (!label) return;

          var bar = document.createElement('div');
          bar.className = 'sd-section-title-bar';
          bar.textContent = label;

          var pane = document.querySelector('#daquestion');
          if (pane) {
            pane.insertBefore(bar, pane.firstChild);
          } else {
            // Fallback for an unfamiliar DA template — anchor at body.
            document.body.insertBefore(bar, document.body.firstChild);
          }
        }

        // 5. BOTTOM ACTION BAR — Previous / Next / Finish.
        //    Our buttons ARE the form submitters: appended INSIDE
        //    DA's form with `type="submit"` and the same `name=`
        //    attributes DA's own buttons use (`_continue`,
        //    `_back_button`). When clicked, the browser submits the
        //    form natively, posting the relevant `_continue=…` /
        //    `_back_button=…` form field along with all answer fields.
        //    DA's server-side handler treats this identically to a
        //    click on its own buttons — same save, same advance.
        //
        //    Earlier proxy approaches (clicking DA's hidden buttons
        //    via jQuery.trigger / dispatchEvent / requestSubmit) were
        //    fragile: jQuery's .trigger('click') fires bound handlers
        //    but skips the default form-submit behavior, and clip-rect
        //    / off-screen positioning broke the submitter identity.
        //    Native form submission via real submit buttons sidesteps
        //    every one of those gotchas.
        function injectBottomBar(isFinal) {
          // Re-render every page load — DA does full-page reloads so
          // there's no stale-state risk; we just clean any prior bar.
          var existing = document.querySelector('.sd-bottom-bar');
          if (existing) existing.remove();

          // Verify DA's question form is on the page; bail otherwise.
          if (!document.getElementById('daform')) return;

          var bar = document.createElement('div');
          bar.className = 'sd-bottom-bar';
          if (isFinal) bar.classList.add('sd-bottom-bar--final');

          // We append `bar` to <body> (NOT inside the form) so that
          // `position: fixed` reliably anchors to the viewport — a
          // transform/filter on any ancestor of #daform would create
          // a fixed-positioning containing block and push the bar
          // off-screen.  HTML5's `form="<id>"` attribute on each
          // submit button associates it with the target form by ID
          // even when the button lives outside the form's DOM
          // hierarchy. Native click → native form submit, no proxy.

          // PREVIOUS — submits DA's separate navbar back form
          // (`#dabackbutton`), which already has the `_back_one=1`
          // hidden input DA's POST handler expects for navigation.
          // Falls back to history.back() if no back form is present
          // (e.g. on the first question).
          var prev = document.createElement('button');
          prev.className = 'sd-btn sd-btn--prev';
          prev.innerHTML = '<span class="sd-btn-glyph">◀</span> Previous';
          if (document.getElementById('dabackbutton')) {
            prev.type = 'submit';
            prev.setAttribute('form', 'dabackbutton');
          } else {
            prev.type = 'button';
            prev.addEventListener('click', function () {
              if (window.history && window.history.length > 1) window.history.back();
            });
          }

          // NEXT — submits #daform with name="_continue", exactly
          // matching DA's own continue button.
          var next = document.createElement('button');
          next.type = 'submit';
          next.setAttribute('form', 'daform');
          next.name = '_continue';
          next.value = 'Continue';
          next.className = 'sd-btn sd-btn--next';
          next.innerHTML = 'Next <span class="sd-btn-glyph">▶</span>';

          // FINISH — same submission as Next, just relabelled. CSS
          // toggles which one is visible based on `--final` class.
          var finish = document.createElement('button');
          finish.type = 'submit';
          finish.setAttribute('form', 'daform');
          finish.name = '_continue';
          finish.value = 'Continue';
          finish.className = 'sd-btn sd-btn--finish';
          finish.innerHTML = '<span class="sd-btn-glyph">✓</span> Finish';

          bar.appendChild(prev);
          bar.appendChild(next);
          bar.appendChild(finish);
          document.body.appendChild(bar);
        }

        function paint() {
          var info = decorateRail() || {};
          injectSectionTitle(info.activeBtn);

          var isFinal = info.activeKey === 'completed' || info.activeKey === 'done';
          if (isFinal) document.body.classList.add('sd-screen-final');
          else document.body.classList.remove('sd-screen-final');

          // Only inject the action bar on screens that have DA's
          // own continue button — skips standalone signature /
          // playground pages where DA wouldn't accept a `_continue=`
          // submit anyway.
          if (document.querySelector('#da-continue-button, button[name="_continue"]')) {
            injectBottomBar(isFinal);
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', paint);
        } else {
          paint();
        }

        // Watchdog: DA's bundle.js injects icon nodes inside nav
        // links AFTER DOMContentLoaded fires. A MutationObserver
        // catches any post-load injection and strips it immediately.
        try {
          var rail = document.querySelector('div.danavdiv');
          if (rail && typeof MutationObserver !== 'undefined') {
            var stripIcons = function () {
              rail.querySelectorAll('a.danavlink').forEach(function (link) {
                for (var i = link.childNodes.length - 1; i >= 0; i--) {
                  var n = link.childNodes[i];
                  if (n.nodeType !== 3) link.removeChild(n);
                }
              });
            };
            var mo = new MutationObserver(function (muts) {
              for (var i = 0; i < muts.length; i++) {
                if (muts[i].addedNodes && muts[i].addedNodes.length) {
                  stripIcons();
                  return;
                }
              }
            });
            mo.observe(rail, { childList: true, subtree: true });
            // Also re-strip after a short delay to catch DA scripts
            // that run later than DOMContentLoaded but before any
            // mutation we observe.
            setTimeout(stripIcons, 50);
            setTimeout(stripIcons, 250);
            setTimeout(stripIcons, 800);
          }
        } catch (e) { /* unsupported old browser — CSS rules cover us */ }
      })();
    </script>
---
# Expose the interview's `metadata: title:` as a plain variable so the
# completion screens can render it with `${ doc_title }` instead of
# hard-coding the document name per-file. Each interview YAML sets its
# own `title:` in its metadata block; this helper reads whichever one
# is active for the current interview.
#
# `all_variables(special='metadata')` is Docassemble's supported way to
# read the aggregated metadata dict at runtime. The title uses a `|`
# block scalar in every SmartDocx interview, so `.strip()` removes the
# trailing newline the YAML parser leaves on literal-style scalars.
# Falls back to empty string if metadata is missing (shouldn't happen,
# but keeps the final screen from crashing if an interview ever omits
# its `title:`).
code: |
  doc_title = all_variables(special='metadata').get('title', '').strip()
