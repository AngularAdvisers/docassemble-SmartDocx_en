mandatory: True
code: |
  multi_user = True
---
# Inject a tiny JS helper on every screen so the per-interview final
# question just needs a <button onclick="smartDocxSaveAndExit(this)">.
# Using `default screen parts` with `post` puts the <script> below the
# question body so the function is defined before any button calls it.
default screen parts:
  post: |
    <style>
      /* HotDocs theme — inlined in every interview response so it
         can never be cached stale. (DA serves /packagestatic/* with
         Cache-Control: public, max-age=31536000, which kept every
         browser locked to the version of sd_en.css that landed on
         their first visit, regardless of package upgrades.) */
      :root {
        --sd-primary: #00578B;
        --sd-primary-hover: #03446e;
        --sd-accent: #4F92C8;
        --sd-active-bg: #E5EFF7;
        --sd-rail-bg: #F4F6F8;
        --sd-pane-bg: #FFFFFF;
        --sd-page-bg: #FAFBFC;
        --sd-border: #C4CDD8;
        --sd-text: #1F2937;
        --sd-muted: #64748B;
        --sd-tick: #2A9D3D;
        --sd-progress: #76D156;
        --sd-input-bg: #FFFFFF;
        --sd-input-text: #1F2937;
        --sd-button-secondary-bg: #FFFFFF;
      }
      [data-bs-theme="dark"] {
        --sd-primary: #6BA8DD;
        --sd-primary-hover: #8FBCE5;
        --sd-accent: #4F92C8;
        --sd-active-bg: rgba(79, 146, 200, 0.22);
        --sd-rail-bg: #1E293B;
        --sd-pane-bg: #0F172A;
        --sd-page-bg: #0B1220;
        --sd-border: #475569;
        --sd-text: #F1F5F9;
        --sd-muted: #94A3B8;
        --sd-tick: #4ADE80;
        --sd-progress: #4ADE80;
        --sd-input-bg: #1E293B;
        --sd-input-text: #F1F5F9;
        --sd-button-secondary-bg: #1E293B;
      }
      .navbar { display: none; }
      body {
        background: var(--sd-page-bg);
        color: var(--sd-text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        padding-bottom: 72px !important;
      }
      /* Outline header — tight, no left icon, "Outline" in title-case
         (no uppercase), collapse/expand chevron pushed to the RIGHT. */
      .sd-outline-header {
        display: flex; align-items: center;
        padding: 8px 12px;
        background: var(--sd-rail-bg); color: var(--sd-text);
        font-size: 14px; font-weight: 600;
        cursor: pointer; user-select: none;
        border-bottom: 1px solid var(--sd-border);
      }
      .sd-outline-header:hover { color: var(--sd-primary); }
      .sd-outline-title { flex: 1; }
      .sd-outline-chev {
        margin-left: auto;
        font-size: 11px; color: var(--sd-muted);
        display: inline-block;
      }
      /* SIDE RAIL — verified against DA's actual rendered structure:
           <div role="navigation" class="...danavdiv">
             <div class="nav flex-column nav-pills danav danav-vertical danavlinks">
               <a class="nav-link danavlink">[group label]</a>
               <div class="nav flex-column ... danav-vertical danavnested">
                 <a class="daclickable nav-link danavlink active">Client's Name</a>
                 ...
               </div>
               <a class="nav-link danavlink">[next group]</a>
               <div style="display:none" class="danotshowing ...danavnested">
                 ...
               </div>
             </div>
           </div>
         Old selectors (.dasections, .btn, .daactive, .dainlineinside)
         don't match this DA version at all — that's why every prior
         theming pass was a no-op for the actual rail. */
      /* MINIMAL CSS — let DA's default flex layout drive size, position,
         and width. Only override colors / fonts / ::before-::after for
         HotDocs cosmetics. Heavy `!important` on display/border/width
         broke the rail's flex layout in 1.0.42 and hid sections; this
         pass goes back to non-aggressive overrides. */

      /* Pull the rail flush against the left edge and to the top of
         the page — no Bootstrap offset, no top gap. */
      div.danavdiv {
        background: var(--sd-rail-bg);
        border-right: 1px solid var(--sd-border);
        padding: 0 !important;
        margin-left: 0 !important;
        margin-top: 0 !important;
      }
      /* Bootstrap's `.offset-xl-1 .col-xl-2 .col-lg-3 .col-md-3` pushes
         the rail in. Override the column offset — col widths stay so
         the question pane keeps its proportional size. */
      div.danavdiv.offset-xl-1 { margin-left: 0 !important; }

      /* Each section link — color + room on the right for the
         collapse icon (group rows) or green ✓ (subsections). No
         left chevron — that left padding caused the duplicated
         "twisties" the user saw. */
      a.danavlink {
        color: var(--sd-text);
        padding-right: 30px !important;
        position: relative;
      }
      a.danavlink:hover { color: var(--sd-primary); }

      /* GROUP labels — non-clickable. NO ::before chevron (was
         confusing the user with multiple icons). The collapse/expand
         icon is injected by JS as a clickable span on the RIGHT,
         outside the link's own click target. */
      a.danavlink:not(.daclickable) {
        font-weight: 700;
        cursor: default;
      }

      /* Wrapper that holds both the group's <a> and its collapse
         button, so the button can sit visually outside the link's
         click area. Injected by JS. */
      .sd-group-row {
        position: relative;
        display: flex;
        align-items: stretch;
      }
      .sd-group-row > a.danavlink { flex: 1; }
      .sd-group-collapse-btn {
        position: absolute;
        right: 6px; top: 50%;
        transform: translateY(-50%);
        width: 22px; height: 22px;
        display: inline-flex;
        align-items: center; justify-content: center;
        background: transparent;
        border: 0;
        color: var(--sd-muted);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        border-radius: 3px;
        padding: 0;
      }
      .sd-group-collapse-btn:hover {
        background: rgba(0, 87, 139, 0.10);
        color: var(--sd-primary);
      }

      /* Make every nested group visible by default — override DA's
         auto-collapse. !important wins over DA's inline display:none.
         Our JS toggles a class to override this when the user clicks
         the collapse button. */
      div.danavnested {
        display: block !important;
      }
      div.danavnested.sd-collapsed {
        display: none !important;
      }

      /* SUBSECTION links: smaller font + muted color. Indent for
         the green ✓ on the LEFT. */
      div.danavnested a.danavlink {
        font-size: 12px;
        font-weight: 400;
        color: var(--sd-muted);
        padding-left: 32px !important;
      }

      /* Active section highlight — pale blue + navy + left bar. */
      a.danavlink.active {
        background: var(--sd-active-bg);
        color: var(--sd-primary);
        font-weight: 600;
        border-left: 3px solid var(--sd-primary);
      }

      /* Green ✓ check after the link text on visited subsections. */
      a.danavlink[data-sd-status="complete"]::after {
        content: "✓";
        position: absolute; left: 14px; top: 50%;
        transform: translateY(-50%);
        width: 14px; height: 14px; border-radius: 50%;
        background: var(--sd-tick); color: #ffffff;
        font-size: 10px; font-weight: 700;
        display: inline-flex; align-items: center; justify-content: center;
        line-height: 1;
      }
      /* Hollow circle for the active leaf (visually distinct from completed). */
      a.danavlink[data-sd-status="active"]::after {
        content: "";
        position: absolute; left: 16px; top: 50%;
        transform: translateY(-50%);
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--sd-pane-bg);
        border: 2px solid var(--sd-primary);
      }
      /* Don't draw the leaf check on group labels (they have a chevron). */
      a.danavlink:not(.daclickable)[data-sd-status]::after { display: none; }
      .sd-section-title-bar {
        background: var(--sd-active-bg); color: var(--sd-primary);
        padding: 14px 24px; margin: 0 0 16px 0;
        font-size: 16px; font-weight: 600;
        border-bottom: 1px solid var(--sd-border);
      }
      #dadiv, .daquestion {
        background: var(--sd-pane-bg); color: var(--sd-text); padding: 0;
      }
      .daquestion .form-control,
      .daquestion input[type="text"],
      .daquestion input[type="email"],
      .daquestion input[type="number"],
      .daquestion input[type="date"],
      .daquestion select,
      .daquestion textarea {
        background: var(--sd-input-bg); color: var(--sd-input-text);
        border: 1px solid var(--sd-border); border-radius: 4px;
        padding: 8px 12px; font-size: 14px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .daquestion .form-control:focus,
      .daquestion input:focus,
      .daquestion select:focus,
      .daquestion textarea:focus {
        border-color: var(--sd-primary);
        box-shadow: 0 0 0 3px rgba(0, 87, 139, 0.18);
        outline: none;
      }
      .daquestion label {
        font-weight: 500; color: var(--sd-text);
        margin-bottom: 6px; font-size: 13px;
      }
      /* Hide DA's native Continue / Back. Actual IDs are
         `#da-continue-button` and `#dabackToQuestion` — earlier
         selectors `button[name="_continue"]` / `#daQuestionSubmit`
         were wrong (left over from older DA versions) which was why
         our bar never replaced the visible Continue. */
      .danavlinkbuttons,
      #da-continue-button,
      #dabackToQuestion,
      button[name="_continue"],
      button[name="_back_button"],
      #daQuestionSubmit,
      #daPageBack {
        position: absolute !important;
        width: 1px !important; height: 1px !important;
        padding: 0 !important; margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        border: 0 !important; white-space: nowrap !important;
      }
      .sd-bottom-bar {
        position: fixed; bottom: 0; left: 0; right: 0;
        display: flex; align-items: center; gap: 8px;
        padding: 10px 24px;
        background: var(--sd-pane-bg);
        border-top: 1px solid var(--sd-border);
        z-index: 1000;
        box-shadow: 0 -2px 8px rgba(15, 23, 42, 0.06);
      }
      .sd-bottom-bar .sd-btn--prev { margin-right: auto; }
      [data-bs-theme="dark"] .sd-bottom-bar {
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.4);
      }
      .sd-btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 7px 18px; font-size: 13px; font-weight: 500;
        border-radius: 4px; border: 1px solid var(--sd-border);
        background: var(--sd-button-secondary-bg);
        color: var(--sd-text); cursor: pointer;
        transition: background 0.12s, border-color 0.12s;
      }
      .sd-btn:hover {
        background: var(--sd-active-bg);
        border-color: var(--sd-primary); color: var(--sd-primary);
      }
      .sd-btn--next, .sd-btn--finish {
        background: var(--sd-primary); border-color: var(--sd-primary);
        color: #ffffff;
      }
      .sd-btn--next:hover, .sd-btn--finish:hover {
        background: var(--sd-primary-hover);
        border-color: var(--sd-primary-hover); color: #ffffff;
      }
      .sd-btn-glyph { font-size: 11px; }
      .sd-bottom-bar.sd-bottom-bar--final .sd-btn--next { display: none; }
      div.daprogress .progress {
        height: 4px; background: transparent; border-radius: 0;
      }
      div.daprogress .progress-bar { background: var(--sd-progress); }
      @media (max-width: 991.98px) {
        div.danavdiv {
          border-right: 0;
          border-bottom: 1px solid var(--sd-border);
        }
        .sd-section-title-bar { padding: 12px 16px; font-size: 15px; }
        .sd-bottom-bar { padding: 8px 16px; }
        .sd-btn { padding: 6px 14px; font-size: 12px; }
        body { padding-bottom: 64px !important; }
      }
      @media (min-width: 992px) {
        .sd-outline-header { padding: 10px 14px; font-size: 12px; }
        .sd-section-title-bar { padding: 10px 20px; margin: 0 0 12px 0; font-size: 14px; }
        .daquestion .form-control,
        .daquestion input[type="text"],
        .daquestion input[type="email"],
        .daquestion input[type="number"],
        .daquestion input[type="date"],
        .daquestion select,
        .daquestion textarea {
          padding: 4px 8px; font-size: 13px;
          height: calc(1.5em + 0.5rem + 2px);
        }
        .daquestion textarea { height: auto; }
        .daquestion label { margin-bottom: 4px; font-size: 12px; }
        .sd-bottom-bar { padding: 8px 24px; }
        .sd-btn { padding: 5px 14px; font-size: 12px; }
        div.daprogress .progress { height: 3px; }
      }
    </style>
    <script>
      function smartDocxSaveAndExit(btn) {
        if (btn) {
          btn.disabled = true;
          btn.innerText = 'Saving...';
        }
        if (window.parent && window.parent !== window) {
          // Read the current session id from the iframe's URL, not from
          // whatever Smart-Docx remembered when it opened us. DA can mint
          // a fresh session mid-flight (e.g. when the original is GC'd or
          // its YAML changed), and the parent must use *that* id for the
          // attach-to-matter mutation — otherwise the backend hits 400 on
          // GET /api/session?session=<dead id>.
          var sessionId = new URLSearchParams(window.location.search).get('session') || '';
          window.parent.postMessage(
            { type: 'docassemble:complete', sessionId: sessionId },
            '*'
          );
        }
      }

      // Theme bridge — listen for the parent's color-scheme directive and
      // mirror it onto <html data-bs-theme="…">. Smart-Docx posts a
      // `smartdocx:theme` message on iframe load and again whenever its
      // dark/light toggle flips, so the interview always matches the
      // parent app's mode. Falls back to whatever DA's server-side render
      // chose when no message is received (e.g. running outside Smart-Docx).
      (function () {
        function applyTheme(mode) {
          var t = (mode === 'dark') ? 'dark' : 'light';
          document.documentElement.setAttribute('data-bs-theme', t);
        }
        window.addEventListener('message', function (ev) {
          var d = ev && ev.data;
          if (!d || typeof d !== 'object') return;
          if (d.type === 'smartdocx:theme') applyTheme(d.mode);
        });
        // Tell the parent we're ready to receive a theme — covers the
        // edge case where the parent missed the iframe's `load` event
        // (e.g. it loads first and the iframe arrives later) by giving
        // it an explicit re-send trigger.
        if (window.parent && window.parent !== window) {
          try {
            window.parent.postMessage({ type: 'smartdocx:theme-request' }, '*');
          } catch (e) { /* parent in different origin pre-handshake — ignore */ }
        }
      })();

      // ─── HotDocs-style chrome orchestrator ─────────────────────────
      // Builds five HotDocs UI elements on top of Docassemble's chrome:
      //
      //   1. OUTLINE HEADER — "▾ Outline" title at the top of the rail,
      //      clicking it collapses the whole rail to a thin gutter.
      //   2. COLLAPSIBLE GROUPS — top-level sections that contain
      //      subsections get a chevron + expand/collapse handler.
      //      Collapsed-state persists per-interview via sessionStorage.
      //   3. COMPLETION TRACKING — every section the user has been on
      //      (DA flags it with .daactive) is recorded in sessionStorage.
      //      On every render we walk the rail and tag visited buttons
      //      with [data-sd-status="complete"] so the CSS draws the green
      //      ✓ only on sections the user has actually filled — not on
      //      every clickable item like before.
      //   4. SECTION TITLE BAR — synthesised at the top of the question
      //      pane from the active rail item's text content. Always in
      //      sync with what's on screen because we read it AT render
      //      time (the previous Mako approach was one render behind).
      //   5. PREVIOUS / NEXT / FINISH FOOTER — sticky bar at the bottom
      //      that drives DA's hidden Back/Continue buttons via .click().
      //      Finish replaces Next on the final `done` screen.
      //
      // Section keys are derived from textContent, NOT URL params or
      // dataset, so they're consistent across the button-vs-anchor
      // representations DA uses for current vs clickable sections.
      // ────────────────────────────────────────────────────────────────
      (function () {
        var INTERVIEW_KEY = 'sd-visited-' + (window.location.pathname || 'i');
        function loadVisited() {
          try {
            var raw = sessionStorage.getItem(INTERVIEW_KEY);
            return raw ? JSON.parse(raw) : {};
          } catch (e) { return {}; }
        }
        function saveVisited(map) {
          try { sessionStorage.setItem(INTERVIEW_KEY, JSON.stringify(map)); }
          catch (e) {}
        }

        // Section keyword — DA puts it on `data-key` attribute of every
        // clickable nav link (verified by inspecting rendered HTML).
        // For group labels (no data-key), fall back to text content.
        function keyOf(link) {
          return link.dataset.key || (link.textContent || '').trim().toLowerCase();
        }

        function decorateRail() {
          // The visible side rail. DA wraps it in `.danavdiv` and the
          // inner nav has classes `nav danav danavlinks danav-vertical`.
          // (DA also emits a horizontal copy in the top navbar for
          // narrow viewports — not what we're styling.)
          var rail = document.querySelector('div.danavdiv nav.danavlinks.danav-vertical, div.danavdiv .danav-vertical.danavlinks, div.danavdiv .nav.danav-vertical');
          if (!rail) {
            // Some DA versions wrap differently — second-best: find the
            // first vertical nav inside any .danavdiv.
            var div = document.querySelector('div.danavdiv');
            if (div) rail = div.querySelector('.nav.flex-column, [class*="danav-vertical"]');
          }
          if (!rail) return null;

          // 1. OUTLINE HEADER — inject once.
          if (!rail.parentElement.querySelector('.sd-outline-header')) {
            var hdr = document.createElement('div');
            hdr.className = 'sd-outline-header';
            hdr.innerHTML = '<span class="sd-outline-chev">▾</span><span class="sd-outline-title">Outline</span>';
            hdr.addEventListener('click', function () {
              var collapsed = rail.parentElement.classList.toggle('sd-rail-collapsed');
              hdr.querySelector('.sd-outline-chev').textContent = collapsed ? '▸' : '▾';
            });
            rail.parentElement.insertBefore(hdr, rail);
          }

          var visited = loadVisited();
          var activeLink = rail.querySelector('a.danavlink.active');
          var activeKey = activeLink ? keyOf(activeLink) : null;

          if (activeKey) {
            visited[activeKey] = true;
            saveVisited(visited);
          }

          // 2. FORCE-EXPAND any nested groups DA collapsed via inline
          //    `style="display: none"` (it auto-collapses non-active
          //    groups). Strip the inline style so our CSS wins.
          rail.querySelectorAll('.danavnested').forEach(function (nested) {
            if (nested.style.display === 'none') nested.style.display = '';
          });

          // 2b. INJECT a single collapse/expand icon on the RIGHT of
          //     every group row. The icon is its own clickable button
          //     so the group's text label stays a non-interactive
          //     label — clicking the text does NOT collapse, only the
          //     button does. (Per the user's spec: "There shouldn't be
          //     a twistie there should be a collapse and expand icon
          //     just right of the text.")
          rail.querySelectorAll('a.danavlink:not(.daclickable)').forEach(function (groupLink) {
            // Skip if we've already wrapped this group.
            if (groupLink.parentElement && groupLink.parentElement.classList.contains('sd-group-row')) return;
            // Find the matching .danavnested sibling (the children
            // container that follows this group label).
            var nested = null;
            var sib = groupLink.nextElementSibling;
            while (sib) {
              if (sib.classList && sib.classList.contains('danavnested')) {
                nested = sib;
                break;
              }
              sib = sib.nextElementSibling;
            }
            if (!nested) return;  // not a group, no children — skip

            // Wrap the link in a row so the collapse button can sit
            // absolutely positioned next to it.
            var row = document.createElement('div');
            row.className = 'sd-group-row';
            groupLink.parentElement.insertBefore(row, groupLink);
            row.appendChild(groupLink);

            // Use a stable per-group sessionStorage key so collapse
            // state survives screen reloads within the interview.
            var collapseKey = INTERVIEW_KEY + ':collapsed:' + (groupLink.textContent || '').trim();
            var collapsed = sessionStorage.getItem(collapseKey) === '1';
            if (collapsed) nested.classList.add('sd-collapsed');

            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'sd-group-collapse-btn';
            btn.setAttribute('aria-label', 'Toggle ' + (groupLink.textContent || '').trim());
            btn.textContent = collapsed ? '＋' : '−';
            btn.addEventListener('click', function (ev) {
              ev.preventDefault();
              ev.stopPropagation();
              var nowCollapsed = !nested.classList.contains('sd-collapsed');
              nested.classList.toggle('sd-collapsed', nowCollapsed);
              btn.textContent = nowCollapsed ? '＋' : '−';
              try { sessionStorage.setItem(collapseKey, nowCollapsed ? '1' : '0'); } catch (e) {}
            });
            row.appendChild(btn);
          });

          // 3. COMPLETION STATUS on every leaf link. Group labels
          //    (no .daclickable) are skipped — they don't get checks.
          rail.querySelectorAll('a.danavlink').forEach(function (link) {
            if (!link.classList.contains('daclickable')) return;
            var key = keyOf(link);
            if (link.classList.contains('active')) {
              link.dataset.sdStatus = 'active';
            } else if (visited[key]) {
              link.dataset.sdStatus = 'complete';
            } else {
              link.removeAttribute('data-sd-status');
            }
          });

          return { activeBtn: activeLink, activeKey: activeKey };
        }

        // 4. SECTION TITLE BAR. Synthesised at the top of the question
        //    pane — always reflects the current screen because we read
        //    .daactive AT this render. Selector falls through several
        //    plausible DA containers; if none match, we anchor the bar
        //    at the top of <main> or <body> so it's always visible.
        function injectSectionTitle(activeBtn) {
          // Drop any prior bar — DA does full-page reloads but defensive
          // anyway in case a screen renders twice.
          document.querySelectorAll('.sd-section-title-bar').forEach(function (n) { n.remove(); });
          if (!activeBtn) return;
          var label = (activeBtn.textContent || '').trim();
          if (!label) return;

          var bar = document.createElement('div');
          bar.className = 'sd-section-title-bar';
          bar.textContent = label;

          var pane = document.querySelector(
            '#daMainQuestion, #daquestion, #dadiv, [role="main"], main, .dafullscreen'
          );
          if (pane && pane.parentElement) {
            pane.parentElement.insertBefore(bar, pane);
          } else {
            // Last-resort anchor: the bar at the top of body so it's
            // never silently missing if DA's HTML structure shifts.
            document.body.insertBefore(bar, document.body.firstChild);
          }
        }

        // 5. BOTTOM ACTION BAR — Previous / Next / Finish.
        //    Drives DA's existing buttons (which we hide via CSS) so
        //    form submission and back navigation work exactly as DA
        //    intends; we just give the user a HotDocs-style three-button
        //    surface instead of DA's default Back/Continue pair.
        function injectBottomBar(isFinal) {
          // Re-render every page load — DA does full-page reloads so
          // there's no stale-state risk; we just clean any prior bar.
          var existing = document.querySelector('.sd-bottom-bar');
          if (existing) existing.remove();

          var bar = document.createElement('div');
          bar.className = 'sd-bottom-bar';
          if (isFinal) bar.classList.add('sd-bottom-bar--final');

          // DA's actual button IDs (verified by inspecting the
          // rendered HTML response): `#da-continue-button` for next,
          // `#dabackToQuestion` for back. Older selectors kept as
          // fallbacks for forward/backward compat with other DA
          // versions, but the IDs above are what 2026 ships.
          var CONT_SEL = '#da-continue-button, button[name="_continue"], #daQuestionSubmit, button[type="submit"]';
          var BACK_SEL = '#dabackToQuestion, button[name="_back_button"], a.danavlinkprevious, #daPageBack';

          var prev = document.createElement('button');
          prev.type = 'button';
          prev.className = 'sd-btn sd-btn--prev';
          prev.innerHTML = '<span class="sd-btn-glyph">◀</span> Previous';
          prev.addEventListener('click', function () {
            var back = document.querySelector(BACK_SEL);
            if (back) back.click();
            else if (window.history && window.history.length > 1) window.history.back();
          });

          var next = document.createElement('button');
          next.type = 'button';
          next.className = 'sd-btn sd-btn--next';
          next.innerHTML = 'Next <span class="sd-btn-glyph">▶</span>';
          next.addEventListener('click', function () {
            var cont = document.querySelector(CONT_SEL);
            if (cont) cont.click();
          });

          var finish = document.createElement('button');
          finish.type = 'button';
          finish.className = 'sd-btn sd-btn--finish';
          finish.innerHTML = '<span class="sd-btn-glyph">✓</span> Finish';
          finish.addEventListener('click', function () {
            var cont = document.querySelector(CONT_SEL);
            if (cont) cont.click();
          });

          bar.appendChild(prev);
          bar.appendChild(next);
          bar.appendChild(finish);
          document.body.appendChild(bar);
        }

        function paint() {
          var info = decorateRail() || {};
          injectSectionTitle(info.activeBtn);

          var isFinal = info.activeKey === 'completed' || info.activeKey === 'done';
          if (isFinal) document.body.classList.add('sd-screen-final');
          else document.body.classList.remove('sd-screen-final');

          // Only inject the action bar on screens that have a Continue
          // button — skips DA's standalone signature/playground pages.
          // Use the same selector list as the bar itself so this gate
          // matches what we'll actually drive via .click().
          if (document.querySelector('#da-continue-button, button[name="_continue"], #daQuestionSubmit, button[type="submit"]')) {
            injectBottomBar(isFinal);
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', paint);
        } else {
          paint();
        }
      })();
    </script>
---
# Expose the interview's `metadata: title:` as a plain variable so the
# completion screens can render it with `${ doc_title }` instead of
# hard-coding the document name per-file. Each interview YAML sets its
# own `title:` in its metadata block; this helper reads whichever one
# is active for the current interview.
#
# `all_variables(special='metadata')` is Docassemble's supported way to
# read the aggregated metadata dict at runtime. The title uses a `|`
# block scalar in every SmartDocx interview, so `.strip()` removes the
# trailing newline the YAML parser leaves on literal-style scalars.
# Falls back to empty string if metadata is missing (shouldn't happen,
# but keeps the final screen from crashing if an interview ever omits
# its `title:`).
code: |
  doc_title = all_variables(special='metadata').get('title', '').strip()
